[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_upload.flash_size = 8MB

lib_deps =
    h2zero/NimBLE-Arduino@^2.0.0
    adafruit/Adafruit MPU6050@^2.2.0
    adafruit/Adafruit Unified Sensor@^1.1.0

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

[env:esp32-c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    h2zero/NimBLE-Arduino@^2.0.0
    adafruit/Adafruit MPU6050@^2.2.0
    adafruit/Adafruit Unified Sensor@^1.1.0

build_flags =
    -DCORE_DEBUG_LEVEL=3
